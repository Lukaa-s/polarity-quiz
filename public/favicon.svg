  <path d="M21.5 22 L43 42.5" stroke="#C62828" stroke-width="7" stroke-linecap="round"/>
  <path d="M42.5 21.5 L21 42" stroke="#1565C0" stroke-width="7" stroke-linecap="round"/>
</svg>
