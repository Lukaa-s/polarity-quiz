<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover : requis pour que env(safe-area-inset-*) soit non nul sur iOS -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#F6F3EC" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Polarity Quiz - Test de positionnement politique</title>
  <meta name="description" content="Découvrez votre position politique en 101 questions : 14 axes idéologiques, comparaison avec 22 personnalités. Gratuit, sans compte." />

  <!-- Icônes -->
  <!-- ?v=2 : cache-busting — les navigateurs cachent agressivement les favicons ;
       incrémenter à chaque changement de logo. -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />

  <!-- Open Graph / Twitter card. URLs ABSOLUES exigées (Facebook) — domaine de
       production : polarity-quiz.fr. L'image se régénère via
       `node scripts/generate-share-assets.mjs`. -->
  <link rel="canonical" href="https://polarity-quiz.fr/" />

  <!-- Alternatives linguistiques (surcouche i18n FR/EN via ?lang). x-default → fr. -->
  <link rel="alternate" hreflang="fr" href="https://polarity-quiz.fr/" />
  <link rel="alternate" hreflang="en" href="https://polarity-quiz.fr/?lang=en" />
  <link rel="alternate" hreflang="x-default" href="https://polarity-quiz.fr/" />

  <meta property="og:type" content="website" />
  <meta property="og:locale" content="fr_FR" />
  <meta property="og:site_name" content="Polarity Quiz" />
  <meta property="og:title" content="Polarity Quiz - Où vous situez-vous ?" />
  <meta property="og:description" content="101 questions, 14 axes idéologiques : découvrez votre position politique et comparez-vous à 22 personnalités. Gratuit, sans compte." />
  <meta property="og:url" content="https://polarity-quiz.fr/" />
  <meta property="og:image" content="https://polarity-quiz.fr/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <!-- Données structurées schema.org (JSON-LD). Bloc de données non exécuté :
       la CSP script-src ne s'applique pas aux data blocks. -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Polarity Quiz",
    "url": "https://polarity-quiz.fr/",
    "description": "Test de positionnement politique : 101 questions, 14 axes idéologiques, comparaison avec 22 personnalités politiques. Gratuit, sans compte, sans publicité.",
    "applicationCategory": "EducationalApplication",
    "operatingSystem": "Web",
    "browserRequirements": "Requires JavaScript",
    "inLanguage": ["fr", "en"],
    "isAccessibleForFree": true,
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" }
  }
  </script>

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Polarity Quiz - Où vous situez-vous ?" />
  <meta name="twitter:description" content="101 questions, 14 axes idéologiques : découvrez votre position politique et comparez-vous à 22 personnalités. Gratuit, sans compte." />
  <meta name="twitter:image" content="https://polarity-quiz.fr/og-image.png" />

  <!-- Typographie éditoriale : Fraunces (display serif) + Libre Franklin (corps) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Libre+Franklin:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- GoatCounter Analytics (gratuit, anti-bot, cookieless, conforme RGPD).
       src/utils/analytics.ts détecte le script et active le tracking des
       événements (démarrage, complétion, partages). La CSP de vercel.json doit
       rester alignée : script-src https://gc.zgo.at, connect-src https://*.goatcounter.com. -->
  <script data-goatcounter="https://polarity-quiz.goatcounter.com/count"
          async src="https://gc.zgo.at/count.js"></script>
</head>
<body>
  <div id="root"></div>
  <noscript>
    <p style="font-family: sans-serif; max-width: 36rem; margin: 4rem auto; padding: 0 1rem; text-align: center;">
      Polarity Quiz est une application interactive : activez JavaScript pour passer le test
      de positionnement politique (101 questions, gratuit, sans compte).
    </p>
  </noscript>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
